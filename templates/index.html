{% extends "base.html" %}
{% block title %}CTF // Login{% endblock %}
{% block content %}
<div class="landing">
    <h1 class="cursor">RI-COMP CTF</h1>
    <p>Enter your handle to begin. 5 levels. Find the flags.</p>
    {% if error %}
    <div class="msg error">{{ error }}</div>
    {% endif %}
    <form method="POST" action="/">
        <input type="text" name="username" placeholder="your_handle" maxlength="20" autofocus required>
        <button type="submit">ENTER</button>
    </form>
</div>
{% endblock %}
